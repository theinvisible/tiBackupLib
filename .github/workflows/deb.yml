name: deb

# Build the Debian packages (tibackuplib + tibackuplib-dev) for every supported
# distribution and publish release tags to the iteas aptly repository
# (aptly REST API).
#
#   * Pushes to master and version tags build the packages once per target distro
#     (Debian 13, Ubuntu 24.04, Ubuntu 26.04) inside the matching stock container,
#     so dh_shlibdeps pins distro-correct dependency versions and the Qt6/libc ABI
#     matches the target. Every build uploads the .deb files as workflow artifacts.
#   * Only version tags (v*) are published: the .deb files are pushed to the aptly
#     REST API (upload -> repo iteas-<codename> -> snapshot -> publish under
#     filesystem:iteas:iteas, Release signed server-side by aptly), and attached to
#     the GitHub Release. Master builds stay as artifacts only. This mirrors the
#     upload_build_release/update_build_release recipe used by the GitLab pipeline.
#   * The legacy Cloudsmith publish is kept but disabled; re-enable it by setting
#     the repository variable PUBLISH_CLOUDSMITH=true.
#
# Requires repository secrets:
#   * APTLY_API          - base URL of the aptly REST API (kept out of this file)
#   * APTLY_AUTH         - HTTP basic auth "user:password" for the aptly API
#   * CLOUDSMITH_API_KEY - only needed if the Cloudsmith path is re-enabled

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

env:
  CLOUDSMITH_REPO: ti-9x5p/tibackup

jobs:
  debian-packages:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Serialize: all legs publish under the same aptly prefix filesystem:iteas:iteas
      # (each a different distribution), so avoid concurrent DELETE/POST publish cycles.
      max-parallel: 1
      matrix:
        image:
          - debian:13
          - ubuntu:24.04
          - ubuntu:26.04
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Bootstrap container & install packaging dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git \
            build-essential fakeroot devscripts debhelper cmake \
            qt6-base-dev qt6-base-dev-tools \
            libpoco-dev libudev-dev libblkid-dev uuid-dev \
            rsync cryptsetup

      - name: Detect distribution
        run: |
          . /etc/os-release
          echo "DISTRO_ID=${ID}" >> "$GITHUB_ENV"
          echo "CODENAME=${VERSION_CODENAME}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Debian packages
        run: |
          mkdir -p artifacts
          # The packages carry a Debian revision but ship no .orig tarball, so
          # debuild prompts "continue anyway?"; answer it non-interactively.
          # headers package (separate source package under tibackuplib-dev/)
          ( cd tibackuplib-dev && echo "y" | debuild -eDEB_BUILD_OPTIONS="parallel=$(nproc)" -us -uc )
          mv tibackuplib-dev_*.deb artifacts/
          # runtime library package
          echo "y" | debuild -eDEB_BUILD_OPTIONS="parallel=$(nproc)" -us -uc
          mv ../tibackuplib_*.deb artifacts/
          # disambiguate filenames per distro (same version lives in several dists)
          ( cd artifacts && for f in *.deb; do arch="${f##*_}"; rest="${f%_*}"; mv "$f" "${rest}_${CODENAME}_${arch}"; done )
          ls -l artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tibackuplib-deb-${{ env.CODENAME }}
          path: artifacts/*.deb

      - name: Publish to iteas apt repository
        if: startsWith(github.ref, 'refs/tags/')
        env:
          APTLY_API: ${{ secrets.APTLY_API }}
          APTLY_AUTH: ${{ secrets.APTLY_AUTH }}
        run: |
          set -euo pipefail
          # Inline of the iteas upload_build_release/update_build_release recipe:
          # aptly signs the Release server-side (GpgKey + PassphraseFile live on the
          # aptly host), so CI only needs basic auth, never key material.
          api="${APTLY_API}"
          oscode="${CODENAME}"
          updir="ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${oscode}"
          curl_a=(curl --fail-with-body -sS -u "${APTLY_AUTH}")

          # 1) upload the built .deb(s) into a per-run upload dir
          for deb in artifacts/*.deb; do
            "${curl_a[@]}" -X POST -F "file=@${deb}" "${api}/files/${updir}"
          done

          # 2) add the uploaded files to the shared per-codename local repo
          resp=$("${curl_a[@]}" -X POST "${api}/repos/iteas-${oscode}/file/${updir}")
          echo "$resp"
          echo "$resp" | grep -qE '"FailedFiles":[[:space:]]*\[[[:space:]]*\]' \
            || { echo "::error::aptly rejected one or more files"; exit 1; }

          # 3) republish: drop old publication+snapshot (ignore 404 on first run),
          #    create a fresh snapshot, then publish it (Release signed by aptly)
          "${curl_a[@]}" -X DELETE "${api}/publish/filesystem:iteas:iteas/${oscode}" || true
          "${curl_a[@]}" -X DELETE "${api}/snapshots/${oscode}-publish" || true
          "${curl_a[@]}" -X POST -H 'Content-Type: application/json' \
            --data "{\"Name\":\"${oscode}-publish\"}" \
            "${api}/repos/iteas-${oscode}/snapshots"
          "${curl_a[@]}" -X POST -H 'Content-Type: application/json' \
            --data "{\"SourceKind\":\"snapshot\",\"Sources\":[{\"Name\":\"${oscode}-publish\"}],\"Architectures\":[\"i386\",\"amd64\"],\"Distribution\":\"${oscode}\",\"Signing\":{\"GpgKey\":\"23CAE45582EB0928\",\"PassphraseFile\":\"/root/gpg_passphrase_iteas\",\"Keyring\":\"/root/.gnupg/pubring.gpg\",\"SecretKeyring\":\"/root/.gnupg/secring.gpg\"}}" \
            "${api}/publish/filesystem:iteas:iteas"

          # 4) best-effort cleanup of the upload dir
          "${curl_a[@]}" -X DELETE "${api}/files/${updir}" || true

      - name: Publish to Cloudsmith (disabled — set repo variable PUBLISH_CLOUDSMITH=true to re-enable)
        if: startsWith(github.ref, 'refs/tags/') && vars.PUBLISH_CLOUDSMITH == 'true'
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        run: |
          apt-get install -y --no-install-recommends python3-pip
          pip3 install --break-system-packages --upgrade cloudsmith-cli
          for deb in artifacts/*.deb; do
            cloudsmith push deb "${CLOUDSMITH_REPO}/${DISTRO_ID}/${CODENAME}" "$deb"
          done

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.deb
