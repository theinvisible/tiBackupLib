name: deb

# Build the Debian packages (tibackuplib + tibackuplib-dev) on dev (master)
# pushes and on release tags. Every build uploads the .deb files as workflow
# artifacts; release tags additionally attach them to the GitHub Release.

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  debian-packages:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential devscripts debhelper cmake \
            qt6-base-dev qt6-base-dev-tools \
            libpoco-dev libudev-dev libblkid-dev uuid-dev \
            rsync cryptsetup

      - name: Build Debian packages
        run: |
          mkdir -p artifacts
          # The packages carry a Debian revision but ship no .orig tarball, so
          # debuild prompts "continue anyway?"; answer it non-interactively.
          # headers package (separate source package under tibackuplib-dev/)
          ( cd tibackuplib-dev && echo "y" | debuild -eDEB_BUILD_OPTIONS="parallel=$(nproc)" -us -uc )
          mv tibackuplib-dev_*.deb artifacts/
          # runtime library package
          echo "y" | debuild -eDEB_BUILD_OPTIONS="parallel=$(nproc)" -us -uc
          mv ../tibackuplib_*.deb artifacts/
          ls -l artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tibackuplib-deb
          path: artifacts/*.deb

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.deb
